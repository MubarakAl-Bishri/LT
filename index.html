<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Links</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        background: url("img/BG.jpg") no-repeat center center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        text-align: center;
        color: white;
        width: 90%;
        max-width: 400px;
      }

      .profile-img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 15px;
        border: 3px solid white;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 5px;
      }

      p {
        font-size: 14px;
        margin-bottom: 20px;
        opacity: 0.8;
      }

      .link {
        display: block;
        background: #13243e;
        color: white;
        text-decoration: none;
        padding: 12px;
        margin: 10px 0;
        border-radius: 25px;
        transition: 0.3s;
      }

      .link:hover {
        background: #333;
        transform: scale(1.03);
      }
    </style>
  </head>

  <body>
    <main class="container" role="main" aria-label="Main content">
      <img
        src="img/profile.jpg"
        alt="Profile of Mubarak Al-Bishri"
        class="profile-img"
        loading="lazy"
      />

      <h1>Mubarak Al-Bishri</h1>
      <p>Just a living organism</p>

      <nav aria-label="Links">
        <a href="https://www.instagram.com/mbr845/" target="_blank" class="link"
          >Instagram</a
        >
        <a href="https://pin.it/KALXbOoMc" target="_blank" class="link"
          >Rasamayn <sub>(my art)</sub></a
        >
        <a href="https://m-albishri.me" target="_blank" class="link"
          >About Me</a
        >
        <a href="https://thoughts.m-albishri.me" target="_blank" class="link"
          >Ideas</a
        >
        <a href="https://19bd.m-albishri.me" target="_blank" class="link"
          >19BD</a
        >
      </nav>
    </main>
  </body>
</html>
