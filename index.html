<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        background: url('BG.jpg') no-repeat center center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        text-align: center;
        color: white;
        width: 90%;
        max-width: 400px;
    }

    .profile-img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 15px;
        border: 3px solid white;
    }

    h1 {
        font-size: 22px;
        margin-bottom: 5px;
    }

    p {
        font-size: 14px;
        margin-bottom: 20px;
        opacity: 0.8;
    }

    .link {
        display: block;
        background: black;
        color: white;
        text-decoration: none;
        padding: 12px;
        margin: 10px 0;
        border-radius: 25px;
        transition: 0.3s;
    }

    .link:hover {
        background: #333;
        transform: scale(1.03);
    }
</style>
</head>

<body>

<div class="container" background="BG.jpg">
    <img src="profile.jpg" alt="Profile" class="profile-img">

    <h1>Mubarak Al-Bishri</h1>
    <p>Just a living organism</p>

    <a href="#" class="link">Instagram</a>
    <a href="#" class="link">Full Steam Streaming Schedule</a>
    <a href="#" class="link">Eleven Magazine</a>
    <a href="#" class="link">Spotify</a>
    <a href="#" class="link">YouTube Tutorials</a>
    <a href="#" class="link">About Me</a>
</div>

</body>
</html>
